<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="yandex-verification" content="ce285854e286b1a4">
    <title>Pomkada</title>
  </head>
  <body class="page">
    <header class="header">
      <img class="logo" src="./images/logo.svg" alt="Логотип Помкада">
    </header>

    <main class="main">
    </main>

    <footer class="footer">
      <p class="footer__text">Made in 2025 with</p>
      <img class="footer__heart" src="./images/footer-heart.svg" alt="Иконка сердечка">
    </footer>

    <template id="button-template">
      <button class="button scale" type="button">
        <span class="button__title"></span>
      </button>
    </template>

    <template id="card-template">
      <div class="card scale">
        <img class="card__image" src="" alt="">
        <div class="card__description-container">
          <h2 class="card__title"></h2>
            <div class="card__details">
              <p class="card__year"></p>
              <p class="card__rating"></p>
            </div>
          <p class="card__description"></p>
        </div>
      </div>
    </template>

    <script type="module" src="./index.js"></script>
  </body>
</html>
