<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="yandex-verification" content="ce285854e286b1a4">
    <title>Помкада</title>
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./styles/globals.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="icon" href="./svg/favicon.svg" type="image/svg+xml">
  </head>
  <body class="page">
    <div class="particles"></div>
    <header class="header">
      <img class="logo" src="./svg/logo.svg" alt="Логотип">
    </header>
    <main class="main">
      <div class="intro">
        <h1 class="intro__title">
          Я
          <span class="accent__text">простил тебя</span>
          и ты
          <span class="accent__text">прости меня за всё.</span>
        </h1>
        <p class="intro__text">
          💔💔💔💔💔
        </p>
      </div>
      <form class="form" action="">
        <input class="input__text" type="text" placeholder="Название фильма">
      </form>
      <div class="buttons">
      </div>
      <div class="cards"></div>
    </main>

    <template id="button-template">
      <button class="button" type="button">
        <span class="button__title"></span>
        <img class="button__icon" src="./svg/chevron-right.svg" alt="Стрелочка вправо" aria-hidden="true">
      </button>
    </template>
    
    <template id="card-template">
      <div class="card">
        <img class="card__image" src="" alt="">
        <div class="card__description">
          <div class="card__title-container">
            <h2 class="card__title"></h2>
          </div>
          <div class="card__text-container">
            <div class="card__text-parameters">
              <p class="card__text year"></p>
              <p class="card__text rating"></p>
            </div>
            <p class="card__text description"></p>
          </div>
        </div>
      </div>
    </template>

    <script src="./scripts/particles.js"></script>
    <script src="./scripts/movies.js"></script>
    <script src="./scripts/main.js"></script>
  </body>
</html>
